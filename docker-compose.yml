services:
  web:
    build: .
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - DB_HOST=192.168.50.20
      - DB_NAME=bigdata
      - DB_USER=bigdata_user
      - DB_PASS=urpasswordhere
    restart: unless-stopped
    # Security: limit resources
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    # Security: read-only filesystem where possible
    read_only: true
    tmpfs:
      - /tmp
    # Security: drop all capabilities
    cap_drop:
      - ALL
    # Security: no privilege escalation
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
