version: "3.8"
services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=192.168.50.20
      - DB_NAME=bigdata
      - DB_USER=bigdata_user
      - DB_PASS=SecurePass123
    restart: unless-stopped
    command: gunicorn --bind 0.0.0.0:5000 --timeout 120 --workers 2 app:app
